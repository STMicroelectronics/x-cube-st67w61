[cfg]
# 0: no erase, 1:programmed section erase, 2: chip erase
erase = 2
# skip mode set first para is skip addr, second para is skip len, multi-segment region with ; separated
skip_mode = 0x0, 0x0
# 0: not use isp mode, #1: isp mode
boot2_isp_mode = 0

[boot2]
filedir = ./st67w611m_boot2_v8.1.9.bin
address = 0x000000

[partition]
filedir = ./partition.bin
address = 0xE000

#media factory
[littlefs] 
filedir = ./../../LittleFS/littlefs/littlefs.bin
address = 0x378000

[FW]
filedir = ./st67w611m_mission_t01_v2.0.75.bin
address = @partition
